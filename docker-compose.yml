version: "3.8"

services:
  uptime-kuma:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - N8N_ENCRYPTION_KEY=ai-assessor-uptime-kuma-secret-2026   # Change this to something long and random
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data: